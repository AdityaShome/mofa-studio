name: Pixi Python & Model Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'pixi.toml'
      - 'libs/dora-common/**'
      - 'node-hub/**'
      - 'models/**'
  pull_request:
    paths:
      - 'pixi.toml'
      - 'libs/dora-common/**'
      - 'node-hub/**'
      - 'models/**'
  workflow_dispatch:

jobs:
  pixi-tests:
    name: pixi test-deps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Create Pixi environment
        run: pixi install

      - name: Run Python dependency tests
        run: pixi run test-deps

