# Voice Chat Dataflow - Linux Compatible (DeepSeek + Kokoro TTS)
#
# Based on apps/mofa-debate/dataflow/voice-chat.yml
# Modified for Linux x86_64:
#   - Uses DeepSeek API instead of OpenAI
#   - Uses dora-kokoro-tts (CPU backend) instead of PrimeSpeech
#
# Usage:
#   export DEEPSEEK_API_KEY="your-key"
#   dora up
#   dora start voice-chat-linux.yml

nodes:
  # ============ Study Participants (DeepSeek) ============

  - id: student1
    build: cargo build --release --manifest-path ../../../node-hub/dora-maas-client/Cargo.toml
    path: ../../../node-hub/dora-maas-client/target/release/dora-maas-client
    inputs:
      text: bridge-to-student1/text
      control: conference-controller/llm_control
    outputs:
      - text
      - status
      - log
    env:
      MAAS_CONFIG_PATH: debate_config_pro_deepseek.toml
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LOG_LEVEL: INFO

  - id: student2
    build: cargo build --release --manifest-path ../../../node-hub/dora-maas-client/Cargo.toml
    path: ../../../node-hub/dora-maas-client/target/release/dora-maas-client
    inputs:
      text: bridge-to-student2/text
      control: conference-controller/llm_control
    outputs:
      - text
      - status
      - log
    env:
      MAAS_CONFIG_PATH: debate_config_con_deepseek.toml
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LOG_LEVEL: INFO

  - id: tutor
    build: cargo build --release --manifest-path ../../../node-hub/dora-maas-client/Cargo.toml
    path: ../../../node-hub/dora-maas-client/target/release/dora-maas-client
    inputs:
      text: bridge-to-tutor/text
      control: conference-controller/judge_prompt
    outputs:
      - text
      - status
      - log
    env:
      MAAS_CONFIG_PATH: debate_config_judge_deepseek.toml
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LOG_LEVEL: INFO

  # ============ Multi-Participant Audio Pipeline ============

  # Multi-Input Text Segmenter with FIFO Session Queue
  - id: multi-text-segmenter
    build: pip install -e ../../../node-hub/dora-text-segmenter
    path: dora-text-segmenter
    inputs:
      student1:
        source: student1/text
        queue_size: 1000
      student2:
        source: student2/text
        queue_size: 1000
      tutor:
        source: tutor/text
        queue_size: 1000

      audio_complete:
        source: mofa-audio-player-debate/audio_complete
        queue_size: 100

      audio_buffer_control:
        source: mofa-audio-player-debate/buffer_status
        queue_size: 10

      control: conference-controller/llm_control
      reset: conference-controller/control_judge

    outputs:
      - text_segment_student1
      - text_segment_student2
      - text_segment_tutor
      - status
      - metrics
      - log

    env:
      SEGMENTER_MODE: "conference"
      SEGMENT_MODE: "sentence"
      MIN_SEGMENT_LENGTH: "5"
      MAX_SEGMENT_LENGTH: "15"
      PUNCTUATION_MARKS: '。！？.!?，,、；：""''（）【】《》'
      REMOVE_SPEAKER_ID: "true"
      LOG_LEVEL: "DEBUG"
      AUDIO_BUFFER_LOW_WATER_MARK: "30"
      AUDIO_BUFFER_HIGH_WATER_MARK: "60"

  # Kokoro TTS for Student1 (CPU backend, English)
  - id: kokoro-tts-student1
    build: pip install -e ../../../node-hub/dora-kokoro-tts
    path: dora-kokoro-tts
    inputs:
      text: multi-text-segmenter/text_segment_student1
    outputs:
      - audio
      - segment_complete
      - log
    env:
      BACKEND: "cpu"
      LANGUAGE: "en"
      VOICE: "am_adam"
      SPEED: "1.0"
      LOG_LEVEL: "INFO"

  # Kokoro TTS for Student2 (CPU backend, English, different voice)
  - id: kokoro-tts-student2
    build: pip install -e ../../../node-hub/dora-kokoro-tts
    path: dora-kokoro-tts
    inputs:
      text: multi-text-segmenter/text_segment_student2
    outputs:
      - audio
      - segment_complete
      - log
    env:
      BACKEND: "cpu"
      LANGUAGE: "en"
      VOICE: "af_heart"
      SPEED: "1.0"
      LOG_LEVEL: "INFO"

  # Kokoro TTS for Tutor (CPU backend, English, authoritative voice)
  - id: kokoro-tts-tutor
    build: pip install -e ../../../node-hub/dora-kokoro-tts
    path: dora-kokoro-tts
    inputs:
      text: multi-text-segmenter/text_segment_tutor
    outputs:
      - audio
      - segment_complete
      - log
    env:
      BACKEND: "cpu"
      LANGUAGE: "en"
      VOICE: "bm_george"
      SPEED: "1.0"
      LOG_LEVEL: "INFO"

  # ============ 3 Conference Bridges (Switch) ============

  # Bridge 1: Student2 + Tutor → Student1
  - id: bridge-to-student1
    build: cargo build --release --manifest-path ../../../node-hub/dora-conference-bridge/Cargo.toml
    path: ../../../node-hub/dora-conference-bridge/target/release/dora-conference-bridge
    env:
      LOG_LEVEL: INFO
      STREAMING_PORTS: student1,tutor,student2
      ERROR_MESSAGE_TEMPLATE: "[{participant} is experiencing technical difficulties. We will proceed without their response.]"
      DORA_STUDY_MODE: "true"
    inputs:
      student2:
        source: student2/text
        queue_size: 1000
      tutor:
        source: tutor/text
        queue_size: 1000
      control:
        source: conference-controller/control_llm1
        queue_size: 10
    outputs:
      - text
      - status
      - log

  # Bridge 2: Student1 + Tutor → Student2
  - id: bridge-to-student2
    build: cargo build --release --manifest-path ../../../node-hub/dora-conference-bridge/Cargo.toml
    path: ../../../node-hub/dora-conference-bridge/target/release/dora-conference-bridge
    env:
      LOG_LEVEL: INFO
      STREAMING_PORTS: student1,tutor,student2
      ERROR_MESSAGE_TEMPLATE: "[{participant} is experiencing technical difficulties. We will proceed without their response.]"
      DORA_STUDY_MODE: "true"
    inputs:
      student1:
        source: student1/text
        queue_size: 1000
      tutor:
        source: tutor/text
        queue_size: 1000
      control:
        source: conference-controller/control_llm2
        queue_size: 10
    outputs:
      - text
      - status
      - log

  # Bridge 3: Student1 + Student2 → Tutor
  - id: bridge-to-tutor
    build: cargo build --release --manifest-path ../../../node-hub/dora-conference-bridge/Cargo.toml
    path: ../../../node-hub/dora-conference-bridge/target/release/dora-conference-bridge
    env:
      LOG_LEVEL: INFO
      STREAMING_PORTS: student1,tutor,student2
      ERROR_MESSAGE_TEMPLATE: "[{participant} is experiencing technical difficulties. We will proceed without their response.]"
      DORA_STUDY_MODE: "true"
    inputs:
      student1:
        source: student1/text
        queue_size: 1000
      student2:
        source: student2/text
        queue_size: 1000
      control:
        source: conference-controller/control_judge
        queue_size: 10
    outputs:
      - text
      - status
      - log

  # ============ Conference Controller (Brain) ============

  - id: conference-controller
    build: cargo build --release --manifest-path ../../../node-hub/dora-conference-controller/Cargo.toml
    path: ../../../node-hub/dora-conference-controller/target/release/dora-conference-controller
    env:
      DORA_POLICY_PATTERN: "[(tutor, *), (student2, 1), (student1, 2)]"
      INITIAL_QUESTION_ID: 1
      AUDIO_BUFFER_THRESHOLD: 30
      AUDIO_BUFFER_RESUME_THRESHOLD: 10
    inputs:
      student1:
        source: student1/text
        queue_size: 1000
      student2:
        source: student2/text
        queue_size: 1000
      tutor:
        source: tutor/text
        queue_size: 1000
      control: mofa-prompt-input-debate/control
      session_start: mofa-audio-player-debate/session_start
      buffer_status: mofa-audio-player-debate/buffer_status
    outputs:
      - control_judge
      - control_llm2
      - control_llm1
      - llm_control
      - judge_prompt
      - status
      - log

  # ============ MoFA Dynamic Nodes (UI Widgets) ============

  # Audio Player - receives synthesized audio and plays through speaker
  - id: mofa-audio-player-debate
    path: dynamic
    inputs:
      audio_student1:
        source: kokoro-tts-student1/audio
        queue_size: 1000
      audio_student2:
        source: kokoro-tts-student2/audio
        queue_size: 1000
      audio_tutor:
        source: kokoro-tts-tutor/audio
        queue_size: 1000
      control:
        source: conference-controller/llm_control
        queue_size: 10
    outputs:
      - buffer_status
      - status
      - session_start
      - audio_complete
      - log

  # Prompt Input - receives LLM text outputs for chat display, sends user control
  - id: mofa-prompt-input-debate
    path: dynamic
    env:
      DORA_STUDY_MODE: "true"
      LOG_LEVEL: "DEBUG"
    inputs:
      llm1_text:
        source: student1/text
        queue_size: 1000
      llm2_text:
        source: student2/text
        queue_size: 1000
      judge_text:
        source: tutor/text
        queue_size: 1000
    outputs:
      - control

  # System Log - aggregates logs from all nodes
  - id: mofa-system-log-debate
    path: dynamic
    inputs:
      llm1_log:
        source: student1/log
        queue_size: 1000
      llm1_status: student1/status
      llm1_text:
        source: student1/text
        queue_size: 1000
      llm2_log:
        source: student2/log
        queue_size: 1000
      llm2_status: student2/status
      llm2_text:
        source: student2/text
        queue_size: 1000
      judge_log:
        source: tutor/log
        queue_size: 1000
      judge_status: tutor/status
      judge_text:
        source: tutor/text
        queue_size: 1000
      bridge1_log:
        source: bridge-to-student1/log
        queue_size: 1000
      bridge1_status: bridge-to-student1/status
      bridge2_log:
        source: bridge-to-student2/log
        queue_size: 1000
      bridge2_status: bridge-to-student2/status
      bridge3_log:
        source: bridge-to-tutor/log
        queue_size: 1000
      bridge3_status: bridge-to-tutor/status
      controller_status: conference-controller/status
      controller_log:
        source: conference-controller/log
        queue_size: 1000
      segmenter_log:
        source: multi-text-segmenter/log
        queue_size: 1000
      segmenter_status: multi-text-segmenter/status
      tts1_log:
        source: kokoro-tts-student1/log
        queue_size: 1000
      tts2_log:
        source: kokoro-tts-student2/log
        queue_size: 1000
      tts3_log:
        source: kokoro-tts-tutor/log
        queue_size: 1000
      audio_status: mofa-audio-player-debate/status
      audio_player_log:
        source: mofa-audio-player-debate/log
        queue_size: 1000
