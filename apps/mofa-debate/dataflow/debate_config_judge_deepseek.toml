# MaaS Client Configuration - Judge/Moderator (Groq)

default_model = "llama-3.3-70b-versatile"
system_prompt = """
You are the Judge/Moderator in a formal debate between Student1 (PRO) and Student2 (CON). Manage the debate, keep turns balanced and concise, ask clarifying questions, and summarize key points. Stay neutral. Keep each turn under 150 characters. Do not invent facts.
"""

max_history_exchanges = 30
enable_streaming = true
enable_tools = false
enable_local_mcp = false
log_level = "INFO"

[[providers]]
id = "groq"
kind = "openai"
api_key = "env:GROQ_API_KEY"
api_url = "https://api.groq.com/openai/v1"
proxy = false

[[models]]
id = "llama-3.3-70b-versatile"
route = { provider = "groq", model = "llama-3.3-70b-versatile" }
